<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
/* FONTS — copiado literal de MCopy */
@font-face { font-family:'Monaspace Neon'; src:url('fonts/Monaspace_Neon_Var.woff2') format('woff2'); font-weight:100 900; font-display:block; }
@font-face { font-family:'Barlow Condensed'; src:url('fonts/BarlowCondensed-Regular.ttf') format('truetype'); font-weight:400; font-display:block; }
@font-face { font-family:'Barlow Condensed'; src:url('fonts/BarlowCondensed-Bold.ttf') format('truetype'); font-weight:700; font-display:block; }
@font-face { font-family:'Barlow Condensed'; src:url('fonts/BarlowCondensed-Black.ttf') format('truetype'); font-weight:900; font-display:block; }

/* VARIABLES — idéntico a MCopy */
:root {
  --bg:#0a0a0a; --sf:#111111; --sf2:#181818; --sf3:#222222;
  --bd:#2a2a2a; --bd2:#3a3a3a;
  --tx:#f0f0f0; --tx2:#888888; --tx3:#555555;
  --ac:#f5c842; --red:#e05c5c; --grn:#5ce07a; --blu:#5c9ee0;
  --r:4px; --tr:.13s ease;
  --font-display:'Barlow Condensed',Impact,sans-serif;
  --font-body:'Segoe UI',system-ui,sans-serif;
  --font-mono:'Courier New',monospace;
  --logo-weight:900; --logo-wght:900;
}
/* RESET — idéntico a MCopy */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--tx);font-family:var(--font-body);font-size:12px;line-height:1.45;border:2px solid var(--bd);border-radius:var(--r);user-select:none;-webkit-user-select:none;}
input,textarea,button,select{font-family:var(--font-body);font-size:12px;}
input,textarea{user-select:text;-webkit-user-select:text;}
input:focus,textarea:focus{outline:none;}
button{cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* TOPBAR — idéntico a MCopy */
#topbar{height:40px;min-height:40px;display:flex;align-items:center;padding:0 9px 0 13px;background:var(--sf);border-bottom:2px solid var(--bd);flex-shrink:0;cursor:default;}
#logo-block{display:flex;flex-direction:column;justify-content:center;gap:2px;}
.logo{font-family:var(--font-display);font-weight:var(--logo-weight);font-variation-settings:'wght' var(--logo-wght);font-size:19px;letter-spacing:.01em;text-transform:uppercase;color:var(--tx);line-height:1;}
.logo em{color:var(--ac);font-style:normal;}
.logo-sub{font-size:8px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;line-height:1;overflow:hidden;transition:opacity .15s ease,max-height .15s ease;}
#topbar-right{display:flex;align-items:center;gap:2px;margin-left:auto;}
.wbtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:13px;color:var(--tx3);cursor:pointer;transition:color var(--tr),background var(--tr);flex-shrink:0;}
.wbtn:hover{color:var(--tx2);background:var(--sf3);}
.wbtn.wclose:hover{color:var(--red);background:rgba(224,92,92,.12);}
.wbtn.wsettings:hover{color:var(--ac);}

/* BOTONES — copiado de MCopy .act-btn */
.btn-area{flex:1;display:flex;flex-direction:column;justify-content:center;gap:7px;padding:11px 12px;}
.act-btn{width:100%;border:2px solid var(--bd);border-radius:var(--r);padding:8px 11px 7px;background:var(--sf);cursor:pointer;transition:background var(--tr),border-color var(--tr),filter var(--tr);text-align:left;display:block;flex-shrink:0;}
.act-btn:hover{background:var(--sf2);border-color:var(--bd2);}
.act-btn:active{background:var(--bg);}
.act-btn.primary{background:var(--ac);border-color:var(--ac);}
.act-btn.primary:hover{filter:brightness(.88);}
.act-btn.primary:active{filter:brightness(.78);}
.act-btn.loading .lbl{animation:blink .65s ease infinite;}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
/* .lbl y .sub — idéntico a MCopy .act-btn .lbl / .act-btn .sub */
.lbl{display:block;font-family:var(--font-display);font-weight:900;font-variation-settings:'wght' 900;font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:var(--tx);line-height:1;}
.act-btn.primary .lbl{color:#000;}
.sub{display:block;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.03em;margin-top:3px;line-height:1;}
.act-btn.primary .sub{color:rgba(0,0,0,.42);}

/* STATUSBAR — idéntico a MCopy */
#statusbar{height:26px;min-height:26px;display:flex;align-items:center;gap:7px;padding:0 11px;background:var(--sf);border-top:2px solid var(--bd);flex-shrink:0;}
#sb-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3);flex-shrink:0;transition:background var(--tr);}
#sb-txt{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);transition:color var(--tr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}

/* Resize behaviour — hide .sub when window is too narrow */
.sub { transition: opacity .15s ease, max-height .15s ease; overflow: hidden; }
.compact .sub,
.compact .logo-sub { opacity: 0; max-height: 0; margin-top: 0; }
.compact .act-btn { padding-bottom: 8px; }
</style>
</head>
<body>

<div id="topbar">
  <div id="drag" style="display:flex;align-items:center;flex:1;cursor:move;height:100%;">
    <div id="logo-block">
      <div class="logo"><em>M</em>PASTE</div>
      <div class="logo-sub" id="logo-sub">for DaVinci Resolve</div>
    </div>
  </div>
  <div id="topbar-right">
    <div class="wbtn wsettings" id="btn-settings">&#9881;</div>
    <div class="wbtn" id="btn-min">&#8211;</div>
    <div class="wbtn wclose" id="btn-close">&#10005;</div>
  </div>
</div>

<div class="btn-area">
  <button class="act-btn" id="copyBtn" data-action="copy">
    <span class="lbl" id="lbl-copy">COPIAR</span>
    <span class="sub" id="sub-copy">frame del cabezal &rarr; portapapeles</span>
  </button>
  <button class="act-btn primary" id="pasteBtn" data-action="paste">
    <span class="lbl" id="lbl-paste">PEGAR</span>
    <span class="sub" id="sub-paste">portapapeles &rarr; timeline</span>
  </button>
</div>

<div id="statusbar">
  <div id="sb-dot"></div>
  <span id="sb-txt">Listo</span>
</div>

<script>
'use strict';

/* ── QWebChannel bootstrap ───────────────────────────────────────────────── */
var backend = null;
new QWebChannel(qt.webChannelTransport, function(ch) {
  backend = ch.objects.backend;
  _init();
});

/* Llama un Slot con retorno → Promise */
function call(method) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    try {
      args.push(function(r) { resolve(r); });
      backend[method].apply(backend, args);
    } catch(e) { reject(e); }
  });
}

/* ── Temas — idéntico a MCopy ────────────────────────────────────────────── */
var THEMES = {
  mmarket:{vars:{'--bg':'#0a0a0a','--sf':'#111111','--sf2':'#181818','--sf3':'#222222','--bd':'#2a2a2a','--bd2':'#3a3a3a','--tx':'#f0f0f0','--tx2':'#888888','--tx3':'#555555','--red':'#e05c5c','--grn':'#5ce07a','--blu':'#5c9ee0'},accents:['#f5c842','#5ce07a','#5c9ee0','#e05c5c','#b48ae0','#e08a5c'],def:'#f5c842'},
  rosepine:{vars:{'--bg':'#191724','--sf':'#1f1d2e','--sf2':'#26233a','--sf3':'#403d52','--bd':'#21202e','--bd2':'#524f67','--tx':'#e0def4','--tx2':'#908caa','--tx3':'#6e6a86','--red':'#eb6f92','--grn':'#9ccfd8','--blu':'#31748f'},accents:['#f6c177','#eb6f92','#ebbcba','#31748f','#9ccfd8','#c4a7e7'],def:'#f6c177'},
  gruvbox:{vars:{'--bg':'#1d2021','--sf':'#282828','--sf2':'#3c3836','--sf3':'#504945','--bd':'#45403d','--bd2':'#5a524c','--tx':'#d4be98','--tx2':'#a89984','--tx3':'#928374','--red':'#ea6962','--grn':'#a9b665','--blu':'#7daea3'},accents:['#d8a657','#ea6962','#e78a4e','#a9b665','#89b482','#7daea3','#d3869b'],def:'#d8a657'}
};

/* ── Fuentes — idéntico a MCopy ─────────────────────────────────────────── */
var FONTS = {
  barlow:    {display:"'Barlow Condensed',Impact,sans-serif",    body:"'Segoe UI',system-ui,sans-serif"},
  monaspace: {display:"'Monaspace Neon',monospace",              body:"'Monaspace Neon',monospace"}
};

/* ── i18n ───────────────────────────────────────────────────────────────── */
var I18N = {
  es:{sub:'for DaVinci Resolve',copy:'COPIAR',copyS:'frame del cabezal \u2192 portapapeles',paste:'PEGAR',pastS:'portapapeles \u2192 timeline',ready:'Listo',copying:'Capturando frame\u2026',pasting:'Procesando\u2026',err:'Error inesperado'},
  en:{sub:'for DaVinci Resolve',copy:'COPY',  copyS:'playhead frame \u2192 clipboard',      paste:'PASTE', pastS:'clipboard \u2192 timeline',         ready:'Ready',  copying:'Capturing frame\u2026',pasting:'Processing\u2026',err:'Unexpected error'},
  hi:{sub:'DaVinci Resolve \u0915\u0947 \u0932\u093f\u090f',copy:'\u0915\u0949\u092a\u0940',copyS:'\u092b\u094d\u0930\u0947\u092e \u2192 \u0915\u094d\u0932\u093f\u092a\u092c\u094b\u0930\u094d\u0921',paste:'\u092a\u0947\u0938\u094d\u091f',pastS:'\u0915\u094d\u0932\u093f\u092a\u092c\u094b\u0930\u094d\u0921 \u2192 \u091f\u093e\u0907\u092e\u0932\u093e\u0907\u0928',ready:'\u0924\u0948\u092f\u093e\u0930',copying:'\u0915\u0948\u092a\u094d\u091a\u0930\u2026',pasting:'\u092a\u094d\u0930\u094b\u0938\u0947\u0938\u093f\u0902\u0917\u2026',err:'\u0924\u094d\u0930\u0941\u091f\u093f'},
  hg:{sub:'DaVinci Resolve ke liye',          copy:'COPY KARO',copyS:'playhead frame \u2192 clipboard',paste:'PASTE KARO',pastS:'clipboard \u2192 timeline',ready:'Taiyaar',copying:'Capture ho raha hai\u2026',pasting:'Processing\u2026',err:'Error aa gaya'}
};

/* ── Estado ─────────────────────────────────────────────────────────────── */
var cfg = {theme:'mmarket', accent:'#f5c842', font:'barlow', lang:'es', always_on_top:true};
var T = I18N.es;

/* ── Aplicar tema/fuente/acento — igual que MCopy ────────────────────────── */
function applyThemeVars(th) {
  var Th = THEMES[th]; if(!Th) return;
  for(var v in Th.vars) document.documentElement.style.setProperty(v, Th.vars[v]);
}
function applyAccent(c) {
  document.documentElement.style.setProperty('--ac', c);
}
function applyFont(f) {
  var F = FONTS[f] || FONTS.barlow;
  document.documentElement.style.setProperty('--font-display', F.display);
  document.documentElement.style.setProperty('--font-body',    F.body);
  document.body.style.fontFamily = F.body;
  var lw = f === 'monaspace' ? '800' : '900';
  document.documentElement.style.setProperty('--logo-weight', lw);
  document.documentElement.style.setProperty('--logo-wght',   lw);
  document.querySelectorAll('input,textarea,button').forEach(function(el) {
    el.style.fontFamily = F.body;
  });
}
function applyI18n(lang) {
  T = I18N[lang] || I18N.es;
  document.getElementById('logo-sub').textContent  = T.sub;
  document.getElementById('lbl-copy').textContent  = T.copy;
  document.getElementById('sub-copy').textContent  = T.copyS;
  document.getElementById('lbl-paste').textContent = T.paste;
  document.getElementById('sub-paste').textContent = T.pastS;
  setStatus(T.ready, '');
}
function applySettings(save) {
  applyThemeVars(cfg.theme);
  applyAccent(cfg.accent);
  applyFont(cfg.font);
  applyI18n(cfg.lang);
  if(save) call('save_settings', JSON.stringify(cfg)).catch(function(){});
}

/* ── Status — igual que MCopy ────────────────────────────────────────────── */
var $dot = document.getElementById('sb-dot');
var $txt = document.getElementById('sb-txt');
function setStatus(msg, level) {
  var m = {ok:'var(--grn)', err:'var(--red)', warn:'var(--ac)', info:'var(--blu)'};
  $dot.style.background = m[level] || 'var(--tx3)';
  $txt.style.color      = m[level] || 'var(--tx3)';
  $txt.textContent      = msg || T.ready;
}

/* ── Drag — mismo patrón que MCopy (sin preventDefault) ─────────────────── */
document.getElementById('drag').addEventListener('mousedown', function(e) {
  if(e.button !== 0 || e.target.closest('#topbar-right')) return;
  if(backend) backend.start_move();
});

/* ── Botones ─────────────────────────────────────────────────────────────── */
var $copy  = document.getElementById('copyBtn');
var $paste = document.getElementById('pasteBtn');

document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if(!btn || btn.classList.contains('loading')) return;
  if(btn.dataset.action === 'copy') {
    setStatus(T.copying, 'info'); $copy.classList.add('loading');
    call('copy_frame').then(function(raw) {
      var r = typeof raw === 'string' ? JSON.parse(raw) : raw;
      $copy.classList.remove('loading'); setStatus(r.msg, r.level);
    }).catch(function() { $copy.classList.remove('loading'); setStatus(T.err, 'err'); });
  }
  if(btn.dataset.action === 'paste') {
    setStatus(T.pasting, 'info'); $paste.classList.add('loading');
    call('paste_image').then(function(raw) {
      var r = typeof raw === 'string' ? JSON.parse(raw) : raw;
      $paste.classList.remove('loading'); setStatus(r.msg, r.level);
    }).catch(function() { $paste.classList.remove('loading'); setStatus(T.err, 'err'); });
  }
});

document.getElementById('btn-close').addEventListener('click',    function() { if(backend) backend.close_window(); });
document.getElementById('btn-min').addEventListener('click',      function() { if(backend) backend.minimize_window(); });
document.getElementById('btn-settings').addEventListener('click', function() { if(backend) backend.open_settings(); });

/* ── Init ────────────────────────────────────────────────────────────────── */
/* Compact mode: hide .sub descriptions when window is narrow */
(function() {
  var COMPACT_W = 200;
  function checkCompact() {
    document.body.classList.toggle('compact', window.innerWidth < COMPACT_W);
  }
  checkCompact();
  if (window.ResizeObserver) {
    new ResizeObserver(checkCompact).observe(document.body);
  } else {
    window.addEventListener('resize', checkCompact);
  }
})();

function _init() {
  Promise.all([
    call('get_settings'),
    call('get_system_lang')
  ]).then(function(res) {
    var s = null;
    try { s = typeof res[0] === 'string' ? JSON.parse(res[0]) : res[0]; } catch(_) {}
    var lang = res[1];
    if(s) {
      if(s.theme  && THEMES[s.theme])  cfg.theme  = s.theme;
      if(s.accent)                     cfg.accent = s.accent;
      if(s.font   && FONTS[s.font])    cfg.font   = s.font;
      if(s.lang   && I18N[s.lang])     cfg.lang   = s.lang;
      if(s.always_on_top !== undefined) cfg.always_on_top = s.always_on_top;
    }
    if(!s || !s.lang) cfg.lang = (I18N[lang] ? lang : cfg.lang);
    applySettings(false);
  }).catch(function() { applySettings(false); });
}
</script>
</body>
</html>
